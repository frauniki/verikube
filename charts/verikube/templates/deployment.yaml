apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "verikube.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "verikube.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "verikube.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "verikube.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "verikube.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: {{ include "verikube.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - manager
            - --health-probe-bind-address=:8081
            - --runner-image={{ include "verikube.runnerImage" . }}
            - --runner-service-account={{ .Values.runnerServiceAccount }}
            {{- if .Values.leaderElection }}
            - --leader-elect
            {{- end }}
            {{- if .Values.allowLocalTargets }}
            - --allow-local-targets
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - --metrics-bind-address={{ .Values.metrics.bindAddress }}
            {{- else }}
            - --metrics-bind-address=0
            {{- end }}
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - containerPort: {{ trimPrefix ":" .Values.metrics.bindAddress }}
              name: metrics
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 10
