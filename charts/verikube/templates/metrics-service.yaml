{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "verikube.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "verikube.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "verikube.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: 8443
      targetPort: metrics
      protocol: TCP
{{- if .Values.metrics.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "verikube.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "verikube.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "verikube.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      scheme: https
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      # verikube metrics carry their own namespace label (the CheckSuite's
      # namespace); without honorLabels Prometheus renames it to
      # exported_namespace and every documented query breaks.
      honorLabels: true
      tlsConfig:
        insecureSkipVerify: true
{{- end }}
{{- end }}
