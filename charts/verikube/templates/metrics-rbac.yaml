{{- if .Values.metrics.enabled }}
# The metrics endpoint is protected by authn/authz: the scraping identity
# needs GET on the /metrics nonResourceURL.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "verikube.fullname" . }}-metrics-reader
  labels:
    {{- include "verikube.labels" . | nindent 4 }}
rules:
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
{{- if .Values.metrics.reader.serviceAccountName }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "verikube.fullname" . }}-metrics-reader
  labels:
    {{- include "verikube.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "verikube.fullname" . }}-metrics-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Values.metrics.reader.serviceAccountName }}
    namespace: {{ .Values.metrics.reader.namespace | default .Release.Namespace }}
{{- end }}
{{- end }}
