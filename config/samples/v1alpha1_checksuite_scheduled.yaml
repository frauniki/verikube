# EKS-flavored scheduled CheckSuite: runs every 30 minutes (UTC) from two
# nodegroups, with the payment nodegroup spread across zones.
apiVersion: verikube.dev/v1alpha1
kind: CheckSuite
metadata:
  labels:
    app.kubernetes.io/name: verikube
    app.kubernetes.io/managed-by: kustomize
  name: checksuite-scheduled-sample
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  historyLimit:
    successful: 3
    failed: 5
  timeout: 10m
  runners:
    - name: payment-nodes
      replicas: 3
      nodeSelector:
        payment-ng: "true"
      topologySpread:
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
    - name: batch-nodes
      nodeSelector:
        batch-ng: "true"
  checks:
    - name: db-reachable # runs from every runner (no runners restriction)
      tcp:
        address: "db.internal:3306"
        timeout: 5s
    - name: payment-api-health # only from the payment nodegroup
      runners: [payment-nodes]
      http:
        url: "https://payment-api.internal/health"
        expectedStatus: [200]
