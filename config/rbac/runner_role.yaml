# ClusterRole for runner pods: the absolute minimum needed to read their
# assigned CheckRun spec and report results into its status.
# Note: within a bound namespace this still allows patching ANY CheckRun's
# status — RBAC cannot scope to single objects. See the security model in
# the README.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: verikube
    app.kubernetes.io/managed-by: kustomize
  name: runner-role
rules:
- apiGroups:
  - verikube.dev
  resources:
  - checkruns
  verbs:
  - get
- apiGroups:
  - verikube.dev
  resources:
  - checkruns/status
  verbs:
  - patch
