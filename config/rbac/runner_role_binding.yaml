apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/name: verikube
    app.kubernetes.io/managed-by: kustomize
  name: runner-rolebinding
  namespace: system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: runner-role
subjects:
- kind: ServiceAccount
  name: verikube-runner
  namespace: system
